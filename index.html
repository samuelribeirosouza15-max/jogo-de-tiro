<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zumbi Shooter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
            cursor: none; /* Esconde a setinha do mouse */
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0f0;
            pointer-events: none;
            text-shadow: 2px 2px 0px #000;
            font-size: 18px;
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            font-size: 50px;
            text-align: center;
            text-shadow: 4px 4px 0px #000;
        }
        #gameOver button {
            font-size: 24px;
            padding: 10px 20px;
            cursor: pointer;
            background: #900;
            color: #fff;
            border: 2px solid red;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="armaAtual">Arma: Pistola</div>
        <div id="vidaUI">Vida: 100</div>
        <div id="killsUI">Kills: 0</div>
    </div>

    <div id="gameOver">
        VOCÊ MORREU<br>
        <button onclick="reiniciarJogo()">Tentar Novamente</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Ajusta a tela para o tamanho da janela
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- SISTEMA DE ARMAS ---
        const armas = [
            { nome: "Pistola", dano: 25, cooldown: 400, velocidade: 12, spread: 0.05, balas: 1, cor: "#ff0" },
            { nome: "Escopeta", dano: 15, cooldown: 800, velocidade: 10, spread: 0.3, balas: 5, cor: "#f80" },
            { nome: "Metralhadora", dano: 10, cooldown: 100, velocidade: 15, spread: 0.15, balas: 1, cor: "#f00" }
        ];
        let armaIndex = 0;
        let ultimoTiro = 0;

        // --- JOGADOR ---
        const jogador = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            raio: 20,
            vida: 100,
            velocidade: 5,
            angulo: 0
        };

        // --- ARRAYS DO JOGO ---
        let balas = [];
        let zumbis = [];
        let particulas = [];
        let kills = 0;
        let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
        let teclas = {};
        let mousePressionado = false;
        let jogoAtivo = true;

        // --- EVENTOS DE CONTROLE ---
        window.addEventListener("keydown", e => teclas[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => teclas[e.key.toLowerCase()] = false);
        window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener("mousedown", () => mousePressionado = true);
        window.addEventListener("mouseup", () => mousePressionado = false);
        
        // Troca de arma com o scroll do mouse
        window.addEventListener("wheel", e => {
            if (e.deltaY > 0) armaIndex = (armaIndex + 1) % armas.length;
            else armaIndex = (armaIndex - 1 + armas.length) % armas.length;
            document.getElementById("armaAtual").innerText = "Arma: " + armas[armaIndex].nome;
        });

        // --- CLASSES DO JOGO ---

        class Bala {
            constructor(x, y, angulo, arma) {
                this.x = x;
                this.y = y;
                this.velocidade = arma.velocidade;
                // Adiciona o spread (esparramo) da arma
                this.vx = Math.cos(angulo + (Math.random() - 0.5) * arma.spread) * this.velocidade;
                this.vy = Math.sin(angulo + (Math.random() - 0.5) * arma.spread) * this.velocidade;
                this.dano = arma.dano;
                this.raio = arma.balas > 1 ? 4 : 6;
                this.cor = arma.cor;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.raio, 0, Math.PI * 2);
                ctx.fillStyle = this.cor;
                ctx.fill();
            }
        }

        class Zumbi {
            constructor() {
                // Spawna fora da tela
                let lado = Math.floor(Math.random() * 4);
                if (lado === 0) { this.x = -50; this.y = Math.random() * canvas.height; }
                else if (lado === 1) { this.x = canvas.width + 50; this.y = Math.random() * canvas.height; }
                else if (lado === 2) { this.x = Math.random() * canvas.width; this.y = -50; }
                else { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; }
                
                this.raio = 25;
                this.vida = 50 + kills * 2; // Fica mais difícil com o tempo
                this.velocidade = 1.5 + Math.random() * 1;
            }
            update() {
                // IA: Perseguir o jogador
                let angulo = Math.atan2(jogador.y - this.y, jogador.x - this.x);
                this.x += Math.cos(angulo) * this.velocidade;
                this.y += Math.sin(angulo) * this.velocidade;
            }
            draw() {
                ctx.font = "40px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                // Muda a cor do zumbi dependendo da vida
                ctx.fillStyle = this.vida < 30 ? "#800" : "#0a0";
                ctx.fillText("🧟", this.x, this.y);
                
                // Barra de vida do zumbi
                ctx.fillStyle = "red";
                ctx.fillRect(this.x - 20, this.y - 35, 40, 5);
                ctx.fillStyle = "green";
                ctx.fillRect(this.x - 20, this.y - 35, 40 * (this.vida / (50 + kills * 2)), 5);
            }
        }

        // --- LÓGICA PRINCIPAL ---

        function atirar() {
            let agora = Date.now();
            let arma = armas[armaIndex];
            if (agora - ultimoTiro > arma.cooldown) {
                for (let i = 0; i < arma.balas; i++) {
                    balas.push(new Bala(jogador.x, jogador.y, jogador.angulo, arma));
                }
                ultimoTiro = agora;
            }
        }

        function spawnarZumbi() {
            // Limita a quantidade de zumbis na tela para não travar o PC
            if (zumbis.length < 20 + kills) {
                zumbis.push(new Zumbi());
            }
        }

        function checarColisoes() {
            for (let i = balas.length - 1; i >= 0; i--) {
                for (let j = zumbis.length - 1; j >= 0; j--) {
                    // Distância entre a bala e o zumbi
                    let dx = balas[i].x - zumbis[j].x;
                    let dy = balas[i].y - zumbis[j].y;
                    let distancia = Math.sqrt(dx * dx + dy * dy);

                    if (distancia < balas[i].raio + zumbis[j].raio) {
                        zumbis[j].vida -= balas[i].dano;
                        balas.splice(i, 1); // Remove a bala

                        if (zumbis[j].vida <= 0) {
                            zumbis.splice(j, 1); // Remove o zumbi
                            kills++;
                            document.getElementById("killsUI").innerText = "Kills: " + kills;
                        }
                        break; // Sai do loop de zumbis para essa bala
                    }
                }
            }

            // Colisão Zumbi vs Jogador
            for (let i = zumbis.length - 1; i >= 0; i--) {
                let dx = jogador.x - zumbis[i].x;
                let dy = jogador.y - zumbis[i].y;
                let distancia = Math.sqrt(dx * dx + dy * dy);

                if (distancia < jogador.raio + zumbis[i].raio) {
                    jogador.vida -= 1; // Dano contínuo ao encostar
                    document.getElementById("vidaUI").innerText = "Vida: " + jogador.vida;
                    
                    // Empurra o zumbi pra trás levemente para não grudar
                    zumbis[i].x -= dx * 0.1;
                    zumbis[i].y -= dy * 0.1;

                    if (jogador.vida <= 0) {
                        jogoAtivo = false;
                        document.getElementById("gameOver").style.display = "block";
                    }
                }
            }
        }

        function update() {
            if (!jogoAtivo) return;

            // Movimento do Jogador (Fugir)
            let vx = 0;
            let vy = 0;
            if (teclas["w"] || teclas["arrowup"]) vy -= 1;
            if (teclas["s"] || teclas["arrowdown"]) vy += 1;
            if (teclas["a"] || teclas["arrowleft"]) vx -= 1;
            if (teclas["d"] || teclas["arrowright"]) vx += 1;

            // Normaliza a velocidade diagonal
            if (vx !== 0 && vy !== 0) {
                vx *= 0.707;
                vy *= 0.707;
            }

            jogador.x += vx * jogador.velocidade;
            jogador.y += vy * jogador.velocidade;

            // Mira do jogador (Seguir o mouse)
            jogador.angulo = Math.atan2(mouse.y - jogador.y, mouse.x - jogador.x);

            // Atirar se o mouse estiver pressionado
            if (mousePressionado) atirar();

            // Atualizar entidades
            balas.forEach(b => b.update());
            zumbis.forEach(z => z.update());

            // Remover balas que saíram da tela
            balas = balas.filter(b => b.x > 0 && b.x < canvas.width && b.y > 0 && b.y < canvas.height);

            checarColisoes();

            // Spawna um zumbi novo a cada 60 frames (aprox 1 segundo)
            if (Math.random() < 0.02 + kills * 0.001) spawnarZumbi();
        }

        function draw() {
            // Limpa a tela (com um leve efeito de "rastro" para ficar Legal)
            ctx.fillStyle = "rgba(20, 20, 20, 0.4)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenha balas
            balas.forEach(b => b.draw());

            // Desenha Zumbis
            zumbis.forEach(z => z.draw());

            // Desenha Jogador
            ctx.save();
            ctx.translate(jogador.x, jogador.y);
            ctx.rotate(jogador.angulo);
            
            // Corpo
            ctx.beginPath();
            ctx.arc(0, 0, jogador.raio, 0, Math.PI * 2);
            ctx.fillStyle = "#00ffcc";
            ctx.fill();
            
            // "Arma" (um retângulo apontando pro mouse)
            ctx.fillStyle = "#fff";
            ctx.fillRect(0, -4, 30, 8);
            
            ctx.restore();

            // Desenha Mira
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 15, 0, Math.PI * 2);
            ctx.strokeStyle = "red";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(mouse.x - 20, mouse.y); ctx.lineTo(mouse.x + 20, mouse.y);
            ctx.moveTo(mouse.x, mouse.y - 20); ctx.lineTo(mouse.x, mouse.y + 20);
            ctx.stroke();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function reiniciarJogo() {
            jogador.x = canvas.width / 2;
            jogador.y = canvas.height / 2;
            jogador.vida = 100;
            kills = 0;
            balas = [];
            zumbis = [];
            jogoAtivo = true;
            document.getElementById("gameOver").style.display = "none";
            document.getElementById("vidaUI").innerText = "Vida: 100";
            document.getElementById("killsUI").innerText = "Kills: 0";
            // Limpa o rastro da tela antiga
            ctx.fillStyle = "#141414";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Inicia o jogo
        loop();

    </script>
</body>
</html>
